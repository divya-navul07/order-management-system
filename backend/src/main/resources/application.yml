spring:
  application:
    name: order-management-system
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://postgres:5432/order_system
    username: postgres
    password: password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  redis:
    host: redis
    port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true

logging:
  level:
    root: INFO
    com.ordersystem: DEBUG
  file:
    name: logs/application.log
